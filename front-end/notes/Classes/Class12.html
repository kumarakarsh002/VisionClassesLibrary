<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    /* PDF Card Design System */
.gallery-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
    justify-content: flex-start; /* Left se align karega */
}

.pdf-card {
    width: 320px;
    background-color: #111b21;
    border-radius: 10px;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: #e9edef;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

.pdf-preview {
    width: 100%;
    height: 140px;
    background-color: white;
    overflow: hidden;
}

.pdf-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
}

.pdf-info {
    display: flex;
    align-items: center;
    padding: 12px;
    background-color: #1a272f;
    gap: 15px;
}

.pdf-icon {
    background-color: #ff3b30;
    color: white;
    font-size: 12px;
    font-weight: bold;
    padding: 6px 8px;
    border-radius: 4px;
}

.pdf-text {
    flex: 1;
    overflow: hidden;
}

.pdf-title {
    font-size: 15px;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.pdf-meta {
    font-size: 13px;
    color: #8696a0;
}

.pdf-actions {
    display: flex;
    justify-content: space-between;
    padding: 0 12px 12px 12px;
    background-color: #1a272f;
}

.action-btn {
    text-decoration: none;
    color: #00a884;
    font-size: 14px;
    font-weight: bold;
    padding: 5px 10px;
    border-radius: 5px;
    background-color: #202c33;
    transition: 0.2s;
}

.action-btn:hover {
    background-color: #2a3942;
}
</style>

<body>
    <!-- Aapka apna content jo pehle se hai -->
<div class="class-header">
    <h2>Class 12th Study Material</h2>
    <p>Yahan par aapko physics aur chemistry ke notes milenge.</p>
</div>

<!-- Bas yahan ye line add kar dijiye jahan PDF cards show karne hain -->
<div id="pdf-container" class="gallery-container"></div>

<!-- Agar iske neeche bhi aapka koi content hai toh wo bhi rakh sakte hain -->
<div class="class-footer">
    <p>Best of luck for your board exams!</p>
</div>    
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E - Library</title>
    <link rel="Stylesheet" href="./css/index.css" />
</head>
<body>
    <div class="main-logincontainer">
        <div class="main-logincontainer-left">
            <img src="./image/login.png" alt="Image"/>
        </div>
        <div class="main-logincontainer-right">
            <h1>Admin Login</h1>
            <form class="main-logincontainer-right-form" id="LoginForm">
                <div class="main-logincontainer-right-form-div">
                    <label>Username</label>
                    <input type="text" placeholder="Enter Your Username" id="username" />
                </div>
                <div class="main-logincontainer-right-form-div">
                    <label>Password</label>
                    <input type="password" placeholder="Enter Your Password" id="password" />
                </div>
            <input type="submit" value="Login" class="main-logincontainer-right-button"/>
            <p>Forget Your Password? <a href="" class="main-logincontainer-right-resetbutton">Reset Your Password</a></p>
            </form>
            
        </div>
    </div>
</body>
<script src="./js/index.js"></script>
</html>
